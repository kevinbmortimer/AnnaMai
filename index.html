<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Anna Mai"/>
<meta name="theme-color" content="#0a1628"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<script>
(function () {
  if (location.protocol === 'http:' || location.protocol === 'https:') {
    var manifest = document.createElement('link');
    manifest.rel = 'manifest';
    manifest.href = 'manifest.json';
    document.head.appendChild(manifest);
  }
}());
</script>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Anna Mai · IRC Europeans 2026</title>
<style>
:root{
  --ink:#060d18;--ink2:#0a1628;--ink3:#0d2040;--ink4:#132540;
  --gold:#D4A017;--gold2:#FFD060;
  --flood:#1E88E5;--flood2:#90CAF9;
  --ebb:#E53935;--ebb2:#EF9A9A;
  --slack:#00BFA5;--slack2:#80CBC4;
  --green:#43A047;--amber:#FF8F00;--purple:#7B1FA2;--purp2:#CE93D8;
  --text:#c8dae8;--sub:#4a6070;--white:#fff;
  --r:10px; /* card border radius */
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--ink);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;flex-direction:column;font-size:14px}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 50% -20%,rgba(30,136,229,.08),transparent 45%);pointer-events:none}

/* ════════════════ HEADER ════════════════ */
#hdr{background:linear-gradient(135deg,#07101e 0%,#0c1e36 100%);border-bottom:1px solid rgba(212,160,23,.2);padding:8px 13px 6px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
#hdr h1{font-family:'Arial Black',Arial,sans-serif;font-size:22px;letter-spacing:3px;color:#fff;line-height:1}
.hdr-sub{font-size:8px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.hdr-r{display:flex;align-items:center;gap:6px}
#upd{font-size:7px;color:var(--sub);font-family:ui-monospace,'Courier New',monospace;text-align:right;line-height:1.5}
.ibtn{background:rgba(212,160,23,.1);border:1px solid rgba(212,160,23,.3);color:var(--gold);border-radius:5px;padding:5px 9px;font-size:10px;font-family:ui-monospace,'Courier New',monospace;cursor:pointer}
.ibtn:active{background:rgba(212,160,23,.25)}

/* ════════════════ NAV ════════════════ */
#nav{display:flex;background:var(--ink2);border-bottom:1px solid var(--ink3);flex-shrink:0}
.nt{flex:1;padding:6px 2px 4px;text-align:center;cursor:pointer;border-bottom:2px solid transparent}
.ni{font-size:19px;display:block;line-height:1.2}
.nl{font-size:7px;color:var(--sub);text-transform:uppercase;letter-spacing:.6px;font-weight:600}
.nt.active{border-bottom-color:var(--gold)}
.nt.active .nl{color:var(--gold)}

/* ════════════════ SCROLL ════════════════ */
#views{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overflow-x:hidden}
.view{display:none;padding:10px 10px 70px}
.view.active{display:block}

/* ════════════════ CARDS ════════════════ */
.card{background:var(--ink2);border:1px solid var(--ink3);border-radius:var(--r);padding:12px 13px;margin-bottom:9px}
.ct{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-family:ui-monospace,'Courier New',monospace;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between}
.ct-r{font-size:8px;color:var(--sub);letter-spacing:0;text-transform:none;font-family:ui-monospace,'Courier New',monospace}

/* ════════════════ WIND VIEW ════════════════ */
.wind-hero{display:flex;align-items:flex-end;gap:8px;margin-bottom:10px}
.wh-num{font-family:'Arial Black',Arial,sans-serif;font-size:76px;line-height:1;color:#fff}
.wh-side{padding-bottom:12px}
.wh-unit{font-size:12px;color:var(--sub);display:block}
.wh-dir{font-family:ui-monospace,'Courier New',monospace;font-size:24px;font-weight:700;color:var(--gold);line-height:1.1}
.wh-bf{font-size:10px;color:var(--sub);margin-top:1px}
.wh-gust{font-size:12px;color:var(--ebb2);font-family:ui-monospace,'Courier New',monospace;font-weight:600;margin-top:3px}
.wgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.wc{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:9px 6px;text-align:center}
.wl{font-size:7px;color:var(--sub);text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px}
.wv{font-family:ui-monospace,'Courier New',monospace;font-size:21px;font-weight:700;color:#fff;line-height:1}
.wu{font-size:8px;color:var(--sub)}
#wr-wrap{display:flex;justify-content:center;margin:0 0 10px}
.hscroll{display:flex;gap:5px;overflow-x:auto;padding-bottom:3px;scrollbar-width:none}
.hscroll::-webkit-scrollbar{display:none}
.hc{flex-shrink:0;width:54px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:7px;padding:6px 4px;text-align:center}
.hc.now{border-color:var(--gold);background:rgba(212,160,23,.08)}
.ht{font-size:7px;color:var(--sub);font-family:ui-monospace,'Courier New',monospace}
.hdir{font-size:11px;color:var(--gold);font-weight:700;margin:2px 0;line-height:1}
.hspd{font-family:ui-monospace,'Courier New',monospace;font-size:15px;font-weight:700;color:#fff;line-height:1}
.hgst{font-size:8px;color:var(--ebb2)}
.api-note{font-size:9px;color:var(--sub);text-align:center;padding:6px;font-family:ui-monospace,'Courier New',monospace;line-height:1.5}
.api-key-row{display:flex;gap:7px;align-items:center;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:8px 10px;margin-bottom:8px}
.api-key-row input{flex:1;background:transparent;border:none;color:var(--text);font-family:ui-monospace,'Courier New',monospace;font-size:11px;outline:none}
.api-key-row input::placeholder{color:var(--sub)}
.api-key-row .save-key{background:rgba(212,160,23,.15);border:1px solid rgba(212,160,23,.3);color:var(--gold);border-radius:4px;padding:4px 9px;font-size:9px;cursor:pointer;font-family:ui-monospace,'Courier New',monospace}

/* ════════════════ TIDE VIEW ════════════════ */
.day-strip{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;margin-bottom:10px;padding-bottom:2px}
.day-strip::-webkit-scrollbar{display:none}
.dp{flex-shrink:0;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:5px 10px;cursor:pointer;text-align:center;transition:all .15s}
.dp.active{background:rgba(212,160,23,.12);border-color:rgba(212,160,23,.4)}
.dp-d{font-size:11px;color:#fff;font-weight:600}
.dp-n{font-size:7px;color:var(--sub);text-transform:uppercase;letter-spacing:.4px}
.tide-events{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.te{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:7px;padding:8px 10px;flex:1;min-width:78px;text-align:center}
.te-l{font-size:7px;color:var(--sub);text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px}
.te-t{font-family:ui-monospace,'Courier New',monospace;font-size:17px;font-weight:700;line-height:1}
.te-h{font-size:10px;color:var(--sub);font-family:ui-monospace,'Courier New',monospace;margin-top:2px}
.te.hw .te-t{color:var(--flood2)}
.te.lw .te-t{color:var(--amber)}
.te.racing{border-color:rgba(212,160,23,.35);background:rgba(212,160,23,.06)}
.curve-wrap{background:rgba(0,0,0,.25);border-radius:8px;padding:8px 4px 4px}

/* ════════════════ STREAM VIEW ════════════════ */
.race-strip{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;margin-bottom:10px}
.race-strip::-webkit-scrollbar{display:none}
.rp{flex-shrink:0;border-radius:6px;padding:5px 10px;cursor:pointer;text-align:center;border:1px solid;opacity:.6;transition:opacity .15s}
.rp.active{opacity:1}
.rp-n{font-family:ui-monospace,'Courier New',monospace;font-size:11px;font-weight:700}
.rp-t{font-size:9px;color:#fff}
.stream-hero{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:11px 13px;margin-bottom:8px}
.sh-arrow{font-size:44px;line-height:1}
.sh-right .sh-state{font-family:'Arial Black',Arial,sans-serif;font-size:22px;letter-spacing:2px;color:#fff}
.sh-right .sh-rate{font-family:ui-monospace,'Courier New',monospace;font-size:16px;font-weight:700}
.sh-right .sh-vmg{font-size:9px;color:var(--sub);margin-top:2px}
.sh-right .sh-tac{font-size:9px;color:var(--gold);margin-top:4px;line-height:1.5;border-top:1px solid rgba(255,255,255,.07);padding-top:4px}
.zone-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
.zone{border-radius:8px;padding:8px 6px;text-align:center;border:1px solid}
.zl{font-size:7px;text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px;font-weight:600}
.zr{font-family:ui-monospace,'Courier New',monospace;font-size:18px;font-weight:700;line-height:1}
.zd{font-size:8px;margin-top:2px}
.zs{font-size:8px;margin-top:1px}
.ll-table{width:100%;border-collapse:collapse;font-size:10px}
.ll-table th{background:var(--ink3);color:var(--gold);font-family:ui-monospace,'Courier New',monospace;font-size:8px;letter-spacing:1px;padding:5px 7px;text-align:left;text-transform:uppercase}
.ll-table td{padding:6px 7px;border-bottom:1px solid rgba(255,255,255,.05);font-family:ui-monospace,'Courier New',monospace;vertical-align:middle}
.ll-table tr:last-child td{border-bottom:none}
.imp-hi{color:var(--ebb2)}.imp-med{color:var(--amber)}.imp-lo{color:var(--slack2)}

/* ════════════════ MARKS VIEW ════════════════ */
.mark-tabs{display:flex;gap:5px;margin-bottom:10px}
.mt-btn{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:7px 4px;text-align:center;cursor:pointer;font-size:10px;color:var(--sub);font-family:ui-monospace,'Courier New',monospace}
.mt-btn.active{background:rgba(212,160,23,.1);border-color:rgba(212,160,23,.35);color:var(--gold)}
.mark-list{display:flex;flex-direction:column;gap:6px}
.mk{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:9px 11px;display:flex;align-items:center;gap:10px}
.mk.selected{border-color:var(--gold);background:rgba(212,160,23,.06)}
.mk-dot{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:ui-monospace,'Courier New',monospace;font-size:10px;font-weight:700;color:#fff;background:rgba(212,160,23,.2)}
.mk-dot-inner{transform:rotate(-45deg)}
.mk-body{flex:1;min-width:0}
.mk-code{font-family:ui-monospace,'Courier New',monospace;font-size:13px;font-weight:700;color:#fff}
.mk-name{font-size:10px;color:var(--sub);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mk-pos{font-size:8px;color:var(--sub);font-family:ui-monospace,'Courier New',monospace;margin-top:2px}
.mk-actions{display:flex;gap:5px}
.mk-btn{background:rgba(255,255,255,.06);border:none;border-radius:5px;padding:5px 8px;font-size:11px;cursor:pointer;color:var(--text)}
.mk-btn:active{background:rgba(255,255,255,.12)}
.mk-btn.del{color:var(--ebb2)}
.add-form{background:var(--ink4);border:1px solid var(--ink3);border-radius:var(--r);padding:12px 13px;margin-bottom:9px}
.add-form .row{display:flex;gap:7px;margin-bottom:8px;align-items:center}
.add-form label{font-size:8px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;min-width:52px;flex-shrink:0}
.add-form input{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:5px;padding:7px 9px;color:var(--text);font-family:ui-monospace,'Courier New',monospace;font-size:11px}
.add-form input:focus{border-color:var(--gold)}
.cat-sel{display:flex;gap:5px;flex-wrap:wrap}
.cat-opt{padding:4px 9px;border-radius:4px;font-size:9px;cursor:pointer;border:1px solid;opacity:.6;font-family:ui-monospace,'Courier New',monospace;font-weight:700}
.cat-opt.active{opacity:1}
.btn-full{width:100%;background:rgba(212,160,23,.15);border:1px solid rgba(212,160,23,.35);color:var(--gold);border-radius:7px;padding:10px;font-size:12px;font-family:ui-monospace,'Courier New',monospace;cursor:pointer}
.btn-full:active{background:rgba(212,160,23,.25)}
.btn-full.danger{background:rgba(229,57,53,.1);border-color:rgba(229,57,53,.3);color:var(--ebb2)}

/* Course builder */
.course-seq{display:flex;flex-wrap:wrap;gap:5px;margin:6px 0 10px;min-height:34px;padding:6px 8px;background:rgba(0,0,0,.2);border-radius:7px;border:1px dashed rgba(255,255,255,.1);align-items:center}
.cs-mark{background:rgba(212,160,23,.15);border:1px solid rgba(212,160,23,.35);border-radius:5px;padding:3px 8px;font-family:ui-monospace,'Courier New',monospace;font-size:11px;color:var(--gold);display:flex;align-items:center;gap:6px}
.cs-mark .rm{color:var(--ebb2);cursor:pointer;font-size:13px}
.cs-empty{font-size:10px;color:var(--sub);font-style:italic}
.course-list{display:flex;flex-direction:column;gap:6px}
.cl-item{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:9px 11px}
.cl-name{font-family:ui-monospace,'Courier New',monospace;font-size:12px;color:#fff;font-weight:700;margin-bottom:4px}
.cl-seq{font-size:10px;color:var(--gold);font-family:ui-monospace,'Courier New',monospace}
.cl-actions{display:flex;gap:5px;margin-top:7px}
.cl-btn{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:5px;padding:5px;text-align:center;font-size:10px;cursor:pointer;color:var(--text);font-family:ui-monospace,'Courier New',monospace}
.cl-btn.del{color:var(--ebb2)}
.wlbd-list{display:flex;flex-direction:column;gap:7px;margin-bottom:9px}
.wlbd-row{display:grid;grid-template-columns:42px 1fr;gap:8px;align-items:center;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:8px 9px}
.wlbd-code{font-family:ui-monospace,'Courier New',monospace;font-size:13px;font-weight:800;color:var(--gold);text-align:center;border:1px solid rgba(212,160,23,.25);border-radius:6px;padding:8px 2px;background:rgba(212,160,23,.08)}
.wlbd-body{min-width:0}
.wlbd-name{font-size:10px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wlbd-pos{font-size:8px;color:var(--sub);font-family:ui-monospace,'Courier New',monospace;margin-top:2px}
.wlbd-inputs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}
.wlbd-inputs input{min-width:0;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:5px;padding:7px 8px;color:var(--text);font-family:ui-monospace,'Courier New',monospace;font-size:11px}
.wlbd-inputs input:focus{border-color:var(--gold);outline:none}

/* ════════════════ START VIEW ════════════════ */
.countdown-card{background:linear-gradient(135deg,#0a1e36,#0d2a40);border:1px solid rgba(212,160,23,.25);border-radius:var(--r);padding:18px 14px;text-align:center;margin-bottom:9px}
.cd-label{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:6px;font-family:ui-monospace,'Courier New',monospace}
.cd-time{font-family:'Arial Black',Arial,sans-serif;font-size:80px;letter-spacing:4px;color:#fff;line-height:1;transition:color .3s}
.cd-time.warn{color:var(--amber)}
.cd-time.go{color:var(--green)}
.cd-time.over{color:var(--ebb)}
.cd-status{font-size:10px;color:var(--sub);margin-top:5px;font-family:ui-monospace,'Courier New',monospace}
.seq-row{display:flex;gap:6px;margin-bottom:9px}
.seq-pill{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:7px;padding:7px 5px;text-align:center;cursor:pointer}
.seq-pill.active{border-color:var(--gold);background:rgba(212,160,23,.1)}
.seq-n{font-size:8px;color:var(--gold);font-family:ui-monospace,'Courier New',monospace;font-weight:700}
.seq-t{font-size:14px;color:#fff;font-family:ui-monospace,'Courier New',monospace;font-weight:700}
.seq-s{font-size:8px;color:var(--sub)}
.ctrl-row{display:flex;gap:7px;margin-bottom:9px}
.ctrl{flex:1;border-radius:8px;padding:12px 6px;text-align:center;cursor:pointer;font-family:ui-monospace,'Courier New',monospace;font-size:11px;font-weight:700;letter-spacing:.5px;border:1px solid}
.ctrl:active{transform:scale(.97)}
.ctrl.set{background:rgba(30,136,229,.12);border-color:rgba(30,136,229,.35);color:var(--flood2)}
.ctrl.sync{background:rgba(212,160,23,.12);border-color:rgba(212,160,23,.35);color:var(--gold)}
.ctrl.rst{background:rgba(229,57,53,.08);border-color:rgba(229,57,53,.2);color:var(--ebb2)}
.ctrl.go-btn{background:rgba(67,160,71,.15);border-color:rgba(67,160,71,.4);color:#81C784}
.bias-section{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:10px 12px;margin-bottom:9px}
.bs-title{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-family:ui-monospace,'Courier New',monospace;margin-bottom:8px}
.bs-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.bs-label{font-size:9px;color:var(--sub);min-width:58px}
.bs-slider{flex:1;-webkit-appearance:none;height:4px;border-radius:2px;outline:none;background:linear-gradient(to right,var(--flood),#666,var(--ebb))}
.bs-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--gold);border:2px solid var(--ink)}
.bs-val{font-family:ui-monospace,'Courier New',monospace;font-size:11px;color:#fff;min-width:36px;text-align:right}
.bias-result{background:rgba(0,0,0,.2);border-radius:7px;padding:9px 11px;font-family:ui-monospace,'Courier New',monospace;font-size:11px;color:var(--text);line-height:1.7}
.bias-result .br-hi{color:var(--gold);font-weight:700;font-size:13px}
.start-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:9px}
.start-cell{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:9px 7px;text-align:center;min-width:0}
.start-cell .sc-k{font-size:7px;color:var(--sub);text-transform:uppercase;letter-spacing:.8px;font-family:ui-monospace,'Courier New',monospace;margin-bottom:3px}
.start-cell .sc-n{font-family:'Arial Black',Arial,sans-serif;font-size:26px;line-height:1;color:#fff}
.start-cell .sc-u{font-size:8px;color:var(--sub);font-family:ui-monospace,'Courier New',monospace;margin-top:2px}
.start-cell.good .sc-n{color:#81C784}
.start-cell.warn .sc-n{color:var(--amber)}
.start-cell.late .sc-n{color:var(--ebb2)}
.sync-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:9px}
.sync-btn{background:rgba(212,160,23,.12);border:1px solid rgba(212,160,23,.32);border-radius:7px;padding:10px 4px;text-align:center;color:var(--gold);font-family:ui-monospace,'Courier New',monospace;font-size:10px;font-weight:700;cursor:pointer}
.sync-btn:active{background:rgba(212,160,23,.24);transform:scale(.97)}

/* ════════════════ UTILS ════════════════ */
.loading{text-align:center;padding:20px;font-size:11px;color:var(--sub);font-family:ui-monospace,'Courier New',monospace}
.err{background:rgba(229,57,53,.1);border:1px solid rgba(229,57,53,.25);border-radius:7px;padding:8px 10px;font-size:10px;color:var(--ebb2);font-family:ui-monospace,'Courier New',monospace;margin-bottom:8px}
.pill{display:inline-block;border-radius:4px;padding:2px 7px;font-size:8px;font-weight:700;font-family:ui-monospace,'Courier New',monospace}
hr.dim{border:none;border-top:1px solid rgba(255,255,255,.06);margin:8px 0}

/* ════════════════ ROUTE OPTIMISER ════════════════ */
.route-race-strip{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;margin-bottom:10px}
.route-race-strip::-webkit-scrollbar{display:none}

<body>
<div id="err-overlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.92);z-index:9999;padding:20px;overflow-y:auto;font-family:ui-monospace,'Courier New',monospace">
  <div style="color:#D4A017;font-size:13px;font-weight:700;margin-bottom:10px">⚠ JavaScript Error</div>
  <div id="err-msg" style="line-height:1.6;white-space:pre-wrap"></div>
  <button onclick="document.getElementById('err-overlay').style.display='none'" style="margin-top:16px;background:rgba(212,160,23,.2);border:1px solid #D4A017;color:#D4A017;border-radius:6px;padding:8px 12px;cursor:pointer;font-family:ui-monospace,'Courier New',monospace">Close</button>
</div>
<script>
window.onerror = function(msg, src, line, col, err) {
  if (!line || line === 0 || !src || src === '') return false;
  var el = document.getElementById('err-overlay');
  var ml = document.getElementById('err-msg');
  if (el && ml) {
    ml.textContent = 'Message: ' + msg + '\nSource: ' + src + '\nLine: ' + line + ', Col: ' + col + '\n\nStack:\n' + (err && err.stack ? err.stack : 'n/a');
    el.style.display = 'block';
  }
  return false;
};
window.addEventListener('unhandledrejection', function(e) {
  var el = document.getElementById('err-overlay');
  var ml = document.getElementById('err-msg');
  if (el && ml) {
    ml.textContent = 'Unhandled Promise Rejection:\n' + (e.reason ? (e.reason.stack || e.reason) : e);
    el.style.display = 'block';
  }
});
</script>
